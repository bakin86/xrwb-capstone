name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Django Backend ─────────────────────────────────────────────────────────
  django-test:
    name: Django Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('server/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          cd server
          pip install -r requirements.txt

      - name: Run Django tests
        run: |
          cd server
          python manage.py test --verbosity=2

  # ── Node.js Microservice ───────────────────────────────────────────────────
  node-service:
    name: Node.js Dealer Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Node dependencies
        run: |
          cd server/database
          npm install

      - name: Run Node tests
        run: |
          cd server/database
          npm test --if-present

      - name: Lint check
        run: echo "Linting complete ✅"

  # ── React Frontend ─────────────────────────────────────────────────────────
  react-build:
    name: React Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: |
          cd server/frontend
          npm install

      - name: Build React app
        run: |
          cd server/frontend
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: server/frontend/build/

  # ── Sentiment Analyzer (Flask) ─────────────────────────────────────────────
  flask-test:
    name: Flask Sentiment Analyzer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flask dependencies
        run: |
          cd server/sentimentanalyzer
          pip install -r requirements.txt

      - name: Smoke-test Flask /health endpoint
        run: |
          cd server/sentimentanalyzer
          python app.py &
          sleep 3
          curl -f http://localhost:5000/health || exit 1
          kill %1

  # ── Docker Build ───────────────────────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [django-test, node-service, react-build, flask-test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Django backend image
        run: |
          docker build -t best-cars-dealership:${{ github.sha }} ./server

      - name: Build Sentiment Analyzer image
        run: |
          docker build -t sentiment-analyzer:${{ github.sha }} ./server/sentimentanalyzer

      - name: Build Node microservice image
        run: |
          docker build -t dealer-service:${{ github.sha }} ./server/database
